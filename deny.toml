[graph]
all-features = true

[licenses]
# GPL-3.0-only is the project license; permissive licenses are compatible when
# used as dependencies in GPL works.
allow = [
    "GPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
private = { ignore = true }

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]

[bans]
multiple-versions = "warn"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
